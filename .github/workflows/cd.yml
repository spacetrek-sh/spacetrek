name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ${{ secrets.REGISTRY }}
  IMAGE_NAME: spacetrk/orchestrator

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to VPS registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # short commit SHA on every push
            type=sha,prefix=sha-,format=short
            # 'latest' on default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # semver tags  (v1.2.3 → 1.2.3 and 1.2)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_SHA=${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'  # only deploy on main, not tags

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.REGISTRY_PASSWORD }}" | \
              docker login ${{ secrets.REGISTRY }} \
              -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

            docker pull ${{ secrets.REGISTRY }}/spacetrk/orchestrator:latest
            docker stop orchestrator || true
            docker rm orchestrator || true
            docker run -d \
              --name orchestrator \
              --restart=always \
              -p 127.0.0.1:8080:8080 \
              ${{ secrets.REGISTRY }}/spacetrk/orchestrator:latest

            docker logout ${{ secrets.REGISTRY }}
