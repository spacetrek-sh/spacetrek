name: spacetrek

services:
  psql:
    container_name: spacetrek-psql
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
    ports:
      - "5432:5432"
    volumes:
      - spacetrek-psql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.19.1
    container_name: spacetrek-migrate
    profiles: ["migrate"]
    volumes:
      - ./migrations:/migrations
    # Run migrations on startup, then exit successfully
    command: ["-path", "/migrations", "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@psql:5432/${POSTGRES_DB}?sslmode=disable", "up"]
    depends_on:
      psql:
        condition: service_healthy
    restart: "no"

  rustfs:
    container_name: spacetrek-rustfs
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?set in .env}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?set in .env}
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - spacetrek-rustfs-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    container_name: spacetrek-api
    environment:
      CONFIG_PATH: /app/configs/config.yaml
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./configs:/app/configs:ro
      - ./seeds:/app/seeds:ro
      # Firecracker VM storage and images from host
      - /var/lib/firecracker:/var/lib/firecracker
      # Host Firecracker binary
      - /usr/local/bin/firecracker:/usr/local/bin/firecracker:ro
      # Firecracker kernel
      - /usr/share/firecracker:/usr/share/firecracker:ro
    devices:
      # KVM device passthrough for hardware virtualization
      - /dev/kvm:/dev/kvm
      # TUN device for TAP network interfaces
      - /dev/net/tun:/dev/net/tun
      # Device-mapper control for dm-snapshot (incremental snapshots)
      - /dev/mapper/control:/dev/mapper/control
      # Loop devices for losetup (dm-snapshot CoW)
      - /dev/loop-control:/dev/loop-control
    ports:
      - "8080:8080"
    privileged: true
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
    depends_on:
      psql:
        condition: service_healthy
      rustfs:
        condition: service_started

volumes:
  spacetrek-psql-data:
  spacetrek-rustfs-data:
