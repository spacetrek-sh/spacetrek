name: spacetrk

services:
  db:
    container_name: spacetrk-db
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: spacetrk
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spacetrk
    ports:
      - "5432:5432"
    volumes:
      - spacetrk-psql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spacetrk -d spacetrk"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.19.1
    container_name: spacetrk-migrate
    profiles: ["migrate"]
    volumes:
      - ./migrations:/migrations
    # Run migrations on startup, then exit successfully
    command: ["-path", "/migrations", "-database", "postgres://spacetrk:password@db:5432/spacetrk?sslmode=disable", "up"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  rustfs:
    container_name: spacetrk-rustfs
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - spacetrk-rustfs-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    container_name: spacetrk-api
    environment:
      CONFIG_PATH: /app/configs/config.yaml
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./configs:/app/configs:ro
      - ./seeds:/app/seeds:ro
      # Firecracker VM storage and images from host
      - /var/lib/firecracker:/var/lib/firecracker
      # Host Firecracker binary
      - /usr/local/bin/firecracker:/usr/local/bin/firecracker:ro
      # Firecracker kernel
      - /usr/share/firecracker:/usr/share/firecracker:ro
    devices:
      # KVM device passthrough for hardware virtualization
      - /dev/kvm:/dev/kvm
      # TUN device for TAP network interfaces
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8080:8080"
    cap_add:
      - SYS_ADMIN  # Required for Firecracker
      - NET_ADMIN  # Required for bridge/TAP/iptables (VM networking)
    security_opt:
      - seccomp=unconfined  # Required for Firecracker syscall filtering
    sysctls:
      - net.ipv4.ip_forward=1
      - net.bridge.bridge-nf-call-iptables=0
      - net.ipv4.conf.all.forwarding=1
    depends_on:
      db:
        condition: service_healthy
      rustfs:
        condition: service_started

volumes:
  spacetrk-psql-data:
  spacetrk-rustfs-data: